server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Ollama API (avoids CORS issues)
    location /api/ollama/ {
        proxy_pass http://host.docker.internal:11434/;
        proxy_set_header Host localhost:11434;
    }

    # Proxy SearXNG search
    location /api/search/ {
        proxy_pass http://searxng:8080/;
    }

    # Proxy ChromaDB memory
    location /api/memory/ {
        proxy_pass http://chromadb:8000/;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}
